<!DOCTYPE html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DayFlow v0.8-m15</title>
<link rel="stylesheet" href="style.css?v=0.8-m15">
</head><body>
<header class="toolbar"><div class="logo">DayFlow <span class="version">v0.8-m15</span></div>
<div class="desktop-actions"><button id="todayBtn">Today</button><button id="desktopFindBtn" type="button">Find</button><button id="accountBtn" type="button">Connect</button><span id="syncStatus" class="sync-status" aria-live="polite">Local only</span></div>
<nav id="androidNav" class="android-nav" aria-label="DayFlow menu"><button id="androidAdd" type="button">Add</button><button id="androidCal" type="button">Cal</button><button id="androidFind" type="button">Find</button><button id="androidAccount" type="button">Account</button><button id="androidAbout" type="button">About</button></nav>
<form id="androidAddForm" class="android-add-form" hidden><input id="androidNewTask" enterkeyhint="go" autocomplete="off" aria-label="New task" placeholder="New task"></form>
<form id="androidSearchForm" class="android-search-form" hidden><input id="androidSearch" type="search" enterkeyhint="search" autocomplete="off" aria-label="Search tasks" placeholder="Search tasks"><button id="androidSearchCancel" type="button">Cancel</button></form>
</header>
<div id="androidPanel" class="android-panel" hidden></div>

<div class="layout">
<aside class="inbox-panel">
<div class="new"><input id="newTask" placeholder="New task"><button id="addBtn">Add</button></div>
<ul id="inbox"></ul>
</aside>

<section class="calendar-panel">
<div class="monthbar"><button id="prev">&lt;</button><h2 id="monthTitle"></h2><button id="next">&gt;</button></div>
<div id="calendar"></div>
</section>

<section class="day-panel">
<h2 id="dayTitle" class="day-title"></h2>
<div class='allday'><div class="allday-header"><b>All Day</b><button id='addAllDay' aria-label="Add all-day appointment">+</button></div><div id='allDay'></div></div>
<div id="timeline"></div>
</section>

<section class="mobile-agenda-panel">
<div id="mobileAgenda"></div>
</section>
</div>
<div id="authDialog" class="modal" hidden>
<div class="modal-backdrop" data-auth-cancel></div>
<form id="authForm" class="appointment-editor auth-editor" role="dialog" aria-modal="true" aria-labelledby="authTitle">
<div class="editor-header"><h2 id="authTitle">Connect DayFlow</h2><button type="button" class="editor-close" data-auth-cancel aria-label="Close">×</button></div>
<p>Sign in to keep the same DayFlow tasks on Android and the browser.</p>
<label class="editor-field">Email<input id="authEmail" type="email" autocomplete="email" required></label>
<label class="editor-field">Password<input id="authPassword" type="password" autocomplete="current-password" minlength="6" required></label>
<button class="auth-primary-action" type="submit">Sign in</button>
<p id="authError" class="editor-error" aria-live="polite"></p>
<div id="changePasswordFields" class="change-password-fields" hidden>
<label class="editor-field">New password<input id="newPassword" type="password" autocomplete="new-password" minlength="6"></label>
<label class="editor-field">Confirm new password<input id="confirmNewPassword" type="password" autocomplete="new-password" minlength="6"></label>
<div><button id="cancelChangePasswordBtn" type="button">Cancel</button><button id="saveNewPasswordBtn" type="button">Save password</button></div>
</div>
<div class="backup-controls" role="region" aria-labelledby="backupTitle">
<h3 id="backupTitle">Data backup</h3>
<p>Save a copy to this device, or merge tasks from an earlier DayFlow backup.</p>
<button id="downloadBackupBtn" class="backup-primary-action" type="button">Download backup</button>
<div class="backup-secondary-actions"><button id="restoreBackupBtn" type="button">Restore file</button><button id="restoreSnapshotBtn" type="button">Restore latest snapshot</button></div>
<input id="restoreBackupFile" type="file" accept="application/json,.json" hidden>
</div>
<div class="auth-secondary-actions"><button id="signOutBtn" type="button" class="danger" hidden>Sign out</button><button id="changePasswordBtn" type="button" hidden>Change password</button><button id="signUpBtn" type="button">Create account</button></div>
</form>
</div>
<div id="desktopSearchDialog" class="modal" hidden>
<div class="modal-backdrop" data-search-cancel></div>
<div class="appointment-editor search-editor" role="dialog" aria-modal="true" aria-labelledby="desktopSearchTitle">
<div class="editor-header"><h2 id="desktopSearchTitle">Find</h2><button type="button" class="editor-close" data-search-cancel aria-label="Close">×</button></div>
<label class="editor-field">Search tasks and notes<input id="desktopSearch" type="search" autocomplete="off" placeholder="Search tasks"></label>
<div id="desktopSearchResults" class="search-results" aria-live="polite"></div>
</div>
</div>
<div id="confirmationDialog" class="modal" hidden>
<div class="modal-backdrop" data-confirm-no></div>
<div class="appointment-editor confirmation-editor" role="dialog" aria-modal="true" aria-labelledby="confirmationTitle" aria-describedby="confirmationMessage">
<h2 id="confirmationTitle">Please confirm</h2>
<p id="confirmationMessage"></p>
<div class="confirmation-actions"><button type="button" data-confirm-no>No</button><button id="confirmationYes" type="button">Yes</button></div>
</div>
</div>
<div id="appointmentEditor" class="modal" hidden>
<div class="modal-backdrop" data-editor-cancel></div>
<form id="appointmentForm" class="appointment-editor" role="dialog" aria-modal="true" aria-labelledby="editorTitle">
<div class="editor-header"><h2 id="editorTitle">Appointment</h2><button type="button" class="editor-close" data-editor-cancel aria-label="Close">×</button></div>
<label class="editor-field">Title<input id="editorTaskTitle" required></label>
<label class="editor-field">Date<input id="editorDate" type="date"></label>
<label class="editor-check"><input id="editorAllDay" type="checkbox">All Day</label>
<div class="editor-times"><label class="editor-field">Start Time<input id="editorStartTime" type="time" step="60"></label><label class="editor-field">End Time<input id="editorEndTime" type="time" step="60"></label></div>
<label class="editor-field">Notes<textarea id="editorNotes" rows="4"></textarea></label>
<label class="editor-field">Color<input id="editorColor" type="color" value="#2f80ed"></label>
<p id="editorError" class="editor-error" aria-live="polite"></p>
<div class="editor-actions"><button id="editorDelete" type="button" class="danger" hidden>Delete</button><span></span><button type="submit">Save</button><button type="button" data-editor-cancel>Cancel</button></div>
</form>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="app.js?v=0.8-m15"></script>
</body></html>
