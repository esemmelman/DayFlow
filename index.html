<!DOCTYPE html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DayFlow v0.7-m5</title>
<link rel="stylesheet" href="style.css">
</head><body>
<header class="toolbar"><div class="logo">DayFlow <span class="version">v0.7-m5</span></div>
<div><button id="todayBtn">Today</button></div></header>

<div class="layout">
<aside class="inbox-panel">
<h2>Inbox</h2>
<div class="new"><input id="newTask" placeholder="New task"><button id="addBtn">Add</button></div>
<ul id="inbox"></ul>
</aside>

<section class="calendar-panel">
<div class="monthbar"><button id="prev">&lt;</button><h2 id="monthTitle"></h2><button id="next">&gt;</button></div>
<div id="calendar"></div>
</section>

<section class="day-panel">
<h2 id="dayTitle"></h2>
<div class='allday'><div class="allday-header"><b>All Day</b><button id='addAllDay' aria-label="Add all-day appointment">+</button></div><div id='allDay'></div></div>
<div id="timeline"></div>
</section>
</div>
<div id="appointmentEditor" class="modal" hidden>
<div class="modal-backdrop" data-editor-cancel></div>
<form id="appointmentForm" class="appointment-editor" role="dialog" aria-modal="true" aria-labelledby="editorTitle">
<div class="editor-header"><h2 id="editorTitle">Appointment</h2><button type="button" class="editor-close" data-editor-cancel aria-label="Close">×</button></div>
<label class="editor-field">Title<input id="editorTaskTitle" required></label>
<label class="editor-field">Date<input id="editorDate" type="date"></label>
<label class="editor-check"><input id="editorAllDay" type="checkbox">All Day</label>
<div class="editor-times"><label class="editor-field">Start Time<input id="editorStartTime" type="time" step="60"></label><label class="editor-field">End Time<input id="editorEndTime" type="time" step="60"></label></div>
<label class="editor-field">Notes<textarea id="editorNotes" rows="4"></textarea></label>
<label class="editor-field">Color<input id="editorColor" type="color" value="#2f80ed"></label>
<p id="editorError" class="editor-error" aria-live="polite"></p>
<div class="editor-actions"><button id="editorDelete" type="button" class="danger" hidden>Delete</button><span></span><button type="button" data-editor-cancel>Cancel</button><button type="submit">Save</button></div>
</form>
</div>
<script src="app.js"></script>
</body></html>
