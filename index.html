<!DOCTYPE html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DayFlow v0.7-m4</title>
<link rel="stylesheet" href="style.css">
</head><body>
<header class="toolbar"><div class="logo">DayFlow</div>
<div><button id="todayBtn">Today</button></div></header>

<div class="layout">
<aside>
<h2>Inbox</h2>
<div class="new"><input id="newTask" placeholder="New task"><button id="addBtn">Add</button></div>
<ul id="inbox"></ul>
</aside>

<section>
<div class="monthbar"><button id="prev">&lt;</button><h2 id="monthTitle"></h2><button id="next">&gt;</button></div>
<div id="calendar"></div>
</section>

<section>
<h2 id="dayTitle"></h2>
<div class='allday'><div style='display:flex;justify-content:space-between'><b>All Day</b><button id='addAllDay'>+</button></div><div id='allDay'></div></div>
<div id="timeline"></div>
</section>
</div>
<script src="app.js"></script>
</body></html>
